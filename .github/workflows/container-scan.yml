name: Container Security Scan

on:
  push:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "**/docker-compose*.yml"
      - ".github/workflows/container-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/Dockerfile"
      - "**/docker-compose*.yml"
      - ".github/workflows/container-scan.yml"
  schedule:
    # Run weekly on Monday at 06:00 UTC to catch newly disclosed CVEs
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ── Scan project Dockerfiles (built images) ──────────────────────────────────
  scan-built-images:
    name: Scan / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: kafka-bridge
            context: .
            dockerfile: services/kafka-bridge/Dockerfile
          - service: lakehouse
            context: .
            dockerfile: services/lakehouse/Dockerfile
          - service: flink-processor
            context: services/flink-processor
            dockerfile: services/flink-processor/Dockerfile
          - service: graphql-api
            context: .
            dockerfile: services/graphql-api/Dockerfile
          - service: dagster-orchestrator
            context: .
            dockerfile: services/dagster-orchestrator/Dockerfile
          - service: superset
            context: services/superset
            dockerfile: services/superset/Dockerfile
          - service: de-stock
            context: .
            dockerfile: services/de-stock/Dockerfile
          - service: docker-exporter
            context: monitoring/docker-exporter
            dockerfile: monitoring/docker-exporter/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t scan-target:${{ matrix.service }} \
            -f ${{ matrix.dockerfile }} \
            ${{ matrix.context }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "scan-target:${{ matrix.service }}"
          format: "sarif"
          output: "trivy-${{ matrix.service }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}.sarif"
          category: "trivy-${{ matrix.service }}"

  # ── Scan third-party images from docker-compose files ────────────────────────
  scan-third-party-images:
    name: Scan / ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: "confluentinc/cp-kafka:7.6.2"
            image_name: cp-kafka
          - image: "confluentinc/cp-schema-registry:7.6.2"
            image_name: cp-schema-registry
          - image: "provectuslabs/kafka-ui:v0.7.2"
            image_name: kafka-ui
          - image: "minio/minio:RELEASE.2025-02-28T09-55-16Z"
            image_name: minio
          - image: "tabulario/iceberg-rest:1.6.1"
            image_name: iceberg-rest
          - image: "postgres:16-alpine"
            image_name: postgres
          - image: "redis:7-alpine"
            image_name: redis
          - image: "mysql:8.0.40"
            image_name: mysql
          - image: "prom/prometheus:v2.51.2"
            image_name: prometheus
          - image: "grafana/grafana:10.4.2"
            image_name: grafana
          - image: "prom/alertmanager:v0.27.0"
            image_name: alertmanager
          - image: "docker.elastic.co/elasticsearch/elasticsearch:7.17.15"
            image_name: elasticsearch
          - image: "openmetadata/server:1.3.1"
            image_name: openmetadata-server
          - image: "openmetadata/ingestion:1.3.1"
            image_name: openmetadata-ingestion

    steps:
      - uses: actions/checkout@v4

      - name: Pull image
        run: docker pull ${{ matrix.image }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ matrix.image }}"
          format: "sarif"
          output: "trivy-${{ matrix.image_name }}.sarif"
          severity: "CRITICAL,HIGH"
          # Don't fail on third-party images — report only
          exit-code: "0"

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.image_name }}.sarif"
          category: "trivy-${{ matrix.image_name }}"

  # ── Summary gate ─────────────────────────────────────────────────────────────
  scan-gate:
    name: Security scan gate
    runs-on: ubuntu-latest
    needs: [scan-built-images, scan-third-party-images]
    if: always()
    steps:
      - name: Check built-image scan results
        run: |
          if [ "${{ needs.scan-built-images.result }}" != "success" ]; then
            echo "::error::Critical/High vulnerabilities found in project Docker images"
            exit 1
          fi
          echo "All project image scans passed"
      - name: Report third-party scan status
        if: always()
        run: |
          if [ "${{ needs.scan-third-party-images.result }}" != "success" ]; then
            echo "::warning::Some third-party images have known vulnerabilities — check the Security tab"
          else
            echo "All third-party image scans completed"
          fi
