groups:
  - name: graphql_api
    interval: 30s
    rules:
      - alert: GraphQLAPIDown
        expr: up{job="graphql-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: graphql-api
        annotations:
          summary: "GraphQL API is down"
          description: "GraphQL API has been unreachable for > 1 minute."

      - alert: GraphQLHighActiveRequests
        expr: graphql_active_requests > 50
        for: 5m
        labels:
          severity: warning
          service: graphql-api
        annotations:
          summary: "GraphQL API has high in-flight request count"
          description: "{{ $value }} active requests sustained for 5+ minutes."

      - alert: GraphQLLowCacheHitRate
        expr: |
          rate(graphql_cache_hits_total[5m]) /
          (rate(graphql_cache_hits_total[5m]) + rate(graphql_cache_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
          service: graphql-api
        annotations:
          summary: "GraphQL cache hit rate below 50%"
          description: "Cache hit rate is {{ $value | humanizePercentage }} for the last 10 minutes."
