groups:
  - name: kafka_health
    interval: 30s
    rules:
      - alert: KafkaBridgeDown
        expr: up{job="kafka-bridge"} == 0
        for: 1m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka Bridge is down"
          description: "Kafka Bridge has been unreachable for > 1 minute."

      - alert: KafkaBridgeNoMessages
        expr: rate(kafka_bridge_ws_messages_received_total[5m]) == 0
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "No messages flowing through Kafka Bridge"
          description: "Kafka Bridge has received no WebSocket messages in the last 5 minutes."

      - alert: KafkaBridgeHighValidationFailures
        expr: rate(kafka_bridge_validation_failures_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "High validation failure rate in Kafka Bridge"
          description: "Kafka Bridge is experiencing {{ $value | printf \"%.2f\" }} validation failures/sec."

      - alert: KafkaBridgeHighDLQ
        expr: increase(kafka_bridge_dlq_produced_total[15m]) > 10
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Dead letter queue messages increasing"
          description: "{{ $value }} messages sent to DLQ in the last 15 minutes."

      - alert: KafkaBridgeHighLatency
        expr: histogram_quantile(0.95, rate(kafka_bridge_latency_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "Kafka Bridge p95 latency above 1s"
          description: "95th percentile bridge latency is {{ $value | humanizeDuration }}."
