groups:
  - name: data_volume
    interval: 60s
    rules:
      - alert: BridgeThroughputDrop
        expr: rate(kafka_bridge_ws_messages_received_total[10m]) < 0.1
        for: 10m
        labels:
          severity: warning
          service: data-quality
        annotations:
          summary: "Bridge message throughput critically low"
          description: >
            Kafka Bridge is receiving only {{ $value | printf "%.2f" }}
            messages/sec (10m avg). Expected at least 0.1 msg/sec during
            market hours.

      - alert: BridgeThroughputZero
        expr: rate(kafka_bridge_ws_messages_received_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
          service: data-quality
        annotations:
          summary: "No messages flowing through pipeline"
          description: >
            Kafka Bridge has received zero messages for 10+ minutes.
            Data pipeline may be completely stalled.
